<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reson Notes</title>

    <style>
        :root {
            --bg: #77c98d;
            --card: #ffffff;
            --text: #000000;
            --accent: #2d5a3a;
            --muted: #666666;
            --star-gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 10px;
        }

        .month-label {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .cal-icon-wrapper { position: absolute; right: 0; top: 0; }
        .cal-icon { cursor: pointer; font-size: 1.4rem; background: none; border: none; }

        /* Calendar Strip */
        .calendar-strip {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            padding: 15px 0;
            scrollbar-width: none;
        }
        .calendar-strip::-webkit-scrollbar { display: none; }

        .day-card {
            min-width: 65px;
            background: var(--card);
            border-radius: 18px;
            padding: 12px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .day-card.active { background: #000; color: white; transform: scale(1.05); }

        /* Modern Filter Dropdown */
        .filter-container {
            width: 100%;
            max-width: 500px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
        }

        .dropdown { position: relative; display: inline-block; }
        
        .dropbtn {
            background: var(--card);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--card);
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: 15px;
            z-index: 100;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
        }

        .dropdown:hover .dropdown-content { display: block; }

        .dropdown-content label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            font-weight: 500;
            border-radius: 8px;
        }

        .dropdown-content label:hover { background: #f0f0f0; }

        /* Custom Modern Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--accent);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        input[type="checkbox"]:checked { background: var(--accent); }
        input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            font-size: 12px;
            left: 3px;
            top: -1px;
        }

        /* Todo List Area */
        .todo-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.9);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .todo-header { font-weight: 800; margin-bottom: 15px; font-size: 1.1rem; }
        .todo-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }

        /* Note Area */
        .note-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: none;
            outline: none;
            resize: none;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .add-note {
            position: absolute;
            bottom: -20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: black;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <header>
        <div class="month-label" id="monthDisplay">March 2026</div>
        <div class="cal-icon-wrapper">
            <button class="cal-icon">🗓️</button>
        </div>
    </header>

    <div class="calendar-strip" id="strip"></div>

    <div class="filter-container">
        <div class="dropdown">
            <button class="dropbtn">Categories ▼</button>
            <div class="dropdown-content" id="categoryDropdown">
                <label><input type="checkbox" value="todo" checked> To-do</label>
                <label><input type="checkbox" value="work" checked> Work</label>
                <label><input type="checkbox" value="groceries" checked> Groceries</label>
                <label><input type="checkbox" value="errands" checked> Errands</label>
                <label><input type="checkbox" value="dreams" checked> Dreams</label>
                <label><input type="checkbox" value="family" checked> Family</label>
                <label><input type="checkbox" value="other" checked> Other</label>
            </div>
        </div>
    </div>

    <div class="todo-card" id="todoList">
        <div class="todo-header">Tasks Overview</div>
        <div id="todoItems">
            <div class="todo-item"><i>Selected notes will appear here...</i></div>
        </div>
    </div>

    <div class="note-container">
        <textarea id="noteContent" placeholder="Type your notes..."></textarea>
        <button class="add-note" onclick="commitNote()">✔</button>
    </div>

    <script>
        const strip = document.getElementById('strip');
        const todoItemsContainer = document.getElementById('todoItems');
        const textarea = document.getElementById('noteContent');
        
        let selectedDate = new Date();
        let db = JSON.parse(localStorage.getItem('reson_db')) || { notes: {} };
        let selectedCategories = new Set(['todo', 'work', 'groceries', 'errands', 'dreams', 'family', 'other']);

        function formatDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function setupCalendar() {
            strip.innerHTML = '';
            const year = selectedDate.getFullYear();
            const month = selectedDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(year, month, i);
                const isSelected = i === selectedDate.getDate();
                const card = document.createElement('div');
                card.className = `day-card ${isSelected ? 'active' : ''}`;
                card.innerHTML = `<div style="font-size:0.7rem;">${date.toLocaleString('en-us', {weekday:'short'})}</div>
                                  <div style="font-weight:800;font-size:1.2rem;">${i}</div>`;
                card.onclick = () => {
                    selectedDate = date;
                    setupCalendar();
                    renderAllNotes();
                };
                strip.appendChild(card);
            }
        }

        function renderAllNotes() {
            todoItemsContainer.innerHTML = '';
            const keyPrefix = formatDateKey(selectedDate);
            let hasContent = false;

            selectedCategories.forEach(cat => {
                const key = keyPrefix + "_" + cat;
                const text = db.notes[key];
                if (text) {
                    hasContent = true;
                    text.split('\n').forEach(line => {
                        if (line.trim()) {
                            const div = document.createElement('div');
                            div.className = 'todo-item';
                            div.innerHTML = `<input type="checkbox"> <span>${line}</span>`;
                            todoItemsContainer.appendChild(div);
                        }
                    });
                }
            });
            if (!hasContent) todoItemsContainer.innerHTML = "<div>No notes for selected categories.</div>";
        }

        function commitNote() {
            const text = textarea.value.trim();
            if (!text) return;
            // For simplicity, saving to 'todo' category by default
            const key = formatDateKey(selectedDate) + "_todo";
            db.notes[key] = text;
            localStorage.setItem('reson_db', JSON.stringify(db));
            textarea.value = '';
            renderAllNotes();
        }

        document.querySelectorAll('#categoryDropdown input').forEach(cb => {
            cb.addEventListener('change', (e) => {
                if (e.target.checked) selectedCategories.add(e.target.value);
                else selectedCategories.delete(e.target.value);
                renderAllNotes();
            });
        });

        window.onload = () => {
            setupCalendar();
            renderAllNotes();
        };
    </script>
</body>
</html>
