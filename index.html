<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reson Notes</title>

    <style>
        :root {
            --bg: #77c98d;
            --card: #ffffff;
            --text: #000000;
            --accent: #2d5a3a;
            --muted: #666666;
            --star-gold: #ffd700;
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            color: var(--text);
        }

        header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
            position: relative;
            margin-bottom: 10px;
        }

        .month-label {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Calendar Row Styling */
        .calendar-row {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 550px;
            gap: 10px;
            margin-bottom: 20px;
        }

        .calendar-strip {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            flex-grow: 1;
            padding: 10px 0;
            scrollbar-width: none;
        }
        .calendar-strip::-webkit-scrollbar { display: none; }

        .day-card {
            min-width: 60px;
            height: 70px;
            background: var(--card);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.2s;
        }
        .day-card.active { background: #000; color: white; transform: scale(1.05); }

        /* Integrated Categories Button */
        .dropdown { position: relative; }
        
        .dropbtn {
            background: var(--card);
            border: none;
            height: 70px;
            padding: 0 15px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--card);
            min-width: 160px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 12px;
            border-radius: 15px;
            z-index: 100;
            right: 0;
            top: 80px;
        }

        .dropdown.open .dropdown-content { display: block; }

        .dropdown-content label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Modern Checkbox */
        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            font-size: 12px;
            left: 3px;
            top: -1px;
        }

        /* Lists and Inputs */
        .todo-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.9);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .todo-header { font-weight: 800; margin-bottom: 15px; font-size: 1.1rem; }
        .todo-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-weight: 500; }

        .note-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 250px;
            border: none;
            outline: none;
            resize: none;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .add-note {
            position: absolute;
            bottom: -20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: black;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <header>
        <div class="month-label" id="monthDisplay">March 2026</div>
    </header>

    <div class="calendar-row">
        <div class="calendar-strip" id="strip"></div>
        
        <div class="dropdown" id="catDropdown">
            <button class="dropbtn" onclick="toggleDropdown()">Tags ▼</button>
            <div class="dropdown-content" id="categoryOptions">
                <label><input type="checkbox" value="todo"> To-do</label>
                <label><input type="checkbox" value="work"> Work</label>
                <label><input type="checkbox" value="groceries"> Groceries</label>
                <label><input type="checkbox" value="errands"> Errands</label>
                <label><input type="checkbox" value="dreams"> Dreams</label>
                <label><input type="checkbox" value="family"> Family</label>
                <label><input type="checkbox" value="roommates"> Roommates</label>
            </div>
        </div>
    </div>

    <div class="todo-card" id="todoList">
        <div class="todo-header">Tasks Overview</div>
        <div id="todoItems">
            <div style="color:#888; font-style: italic;">Select categories to filter notes...</div>
        </div>
    </div>

    <div class="note-container">
        <textarea id="noteContent" placeholder="Type your notes..."></textarea>
        <button class="add-note" onclick="commitNote()">✔</button>
    </div>

    <script>
        const strip = document.getElementById('strip');
        const todoItemsContainer = document.getElementById('todoItems');
        const textarea = document.getElementById('noteContent');
        
        let selectedDate = new Date();
        // Load data from localStorage
        let db = JSON.parse(localStorage.getItem('reson_db')) || { notes: {} };
        // Empty by default as requested
        let selectedCategories = new Set(); 

        function formatDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function toggleDropdown() {
            document.getElementById('catDropdown').classList.toggle('open');
        }

        function setupCalendar() {
            strip.innerHTML = '';
            const year = selectedDate.getFullYear();
            const month = selectedDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(year, month, i);
                const isSelected = i === selectedDate.getDate();
                const card = document.createElement('div');
                card.className = `day-card ${isSelected ? 'active' : ''}`;
                card.innerHTML = `<div style="font-size:0.7rem;">${date.toLocaleString('en-us', {weekday:'short'})}</div>
                                  <div style="font-weight:800;font-size:1.2rem;">${i}</div>`;
                card.onclick = () => {
                    selectedDate = date;
                    setupCalendar();
                    renderAllNotes();
                };
                strip.appendChild(card);
            }
        }

        function renderAllNotes() {
            todoItemsContainer.innerHTML = '';
            const keyPrefix = formatDateKey(selectedDate);
            let contentFound = false;

            if (selectedCategories.size === 0) {
                todoItemsContainer.innerHTML = '<div style="color:#888; font-style: italic;">Select a category to view items.</div>';
                return;
            }

            selectedCategories.forEach(cat => {
                const key = keyPrefix + "_" + cat;
                const text = db.notes[key];
                if (text) {
                    contentFound = true;
                    text.split('\n').forEach(line => {
                        if (line.trim()) {
                            const div = document.createElement('div');
                            div.className = 'todo-item';
                            div.innerHTML = `<input type="checkbox"> <span>${line}</span>`;
                            todoItemsContainer.appendChild(div);
                        }
                    });
                }
            });

            if (!contentFound) {
                todoItemsContainer.innerHTML = '<div style="color:#888; font-style: italic;">Nothing found for these categories.</div>';
            }
        }

        function commitNote() {
            const text = textarea.value.trim();
            if (!text) return;
            
            // Defaulting to 'todo' if none selected, or the first selected tag
            const cat = selectedCategories.size > 0 ? Array.from(selectedCategories)[0] : 'todo';
            const key = formatDateKey(selectedDate) + "_" + cat;
            
            // Append or create
            db.notes[key] = db.notes[key] ? db.notes[key] + "\n" + text : text;
            
            localStorage.setItem('reson_db', JSON.stringify(db));
            textarea.value = '';
            renderAllNotes();
        }

        // Handle category selection
        document.querySelectorAll('#categoryOptions input').forEach(cb => {
            cb.addEventListener('change', (e) => {
                if (e.target.checked) selectedCategories.add(e.target.value);
                else selectedCategories.delete(e.target.value);
                renderAllNotes();
            });
        });

        // Close dropdown when clicking away
        window.onclick = (e) => {
            if (!e.target.closest('.dropdown')) {
                document.getElementById('catDropdown').classList.remove('open');
            }
        };

        window.onload = () => {
            setupCalendar();
            renderAllNotes();
        };
    </script>
</body>
</html>
