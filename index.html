<style>
/* 1. Fixes the Shorter Note Boxes */
.saved-note {
    position: relative; 
    background: #ffffff;
    padding: 12px 14px; /* Tighter padding to save space */
    border-radius: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    min-height: 90px;   /* Significantly shorter than before */
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    border: 1px solid rgba(0,0,0,0.02);
    overflow: hidden;
}

.saved-note-text {
    font-size: 0.82rem;
    color: #444;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3; /* Only shows 3 lines to keep the box short */
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-top: 2px;
}

/* 2. Sleek iOS-style dots button (Absolute Positioned) */
.note-menu-btn {
    position: absolute;
    top: 8px;
    right: 6px;
    background: none !important;
    border: none !important;
    color: #ccc; 
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
    z-index: 10;
}

/* 3. iOS-style Blur Context Menu */
#noteMenu {
    display: none;
    position: absolute;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-radius: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    padding: 8px !important;
    z-index: 3000;
    min-width: 160px;
    border: 1px solid rgba(255,255,255,0.5);

</style>
<script>
const strip = document.getElementById('strip');
const fullGrid = document.getElementById('fullGrid');
const textarea = document.getElementById('noteContent');

// Auto bullet continuation
textarea.addEventListener('keydown', function(e) {
    if (e.key === "Enter") {
        const start = textarea.selectionStart;
        const before = textarea.value.substring(0, start);
        const line = before.split("\n").pop();
        if (line.trim().startsWith("•")) {
            e.preventDefault();
            textarea.value = textarea.value.substring(0, start) + "\n• " + textarea.value.substring(start);
            textarea.selectionStart = textarea.selectionEnd = start + 3;
        }
    }
});

let selectedDate = new Date();
let currentCategory = null;

// Initialize Database correctly
let db = JSON.parse(localStorage.getItem('reson_db')) || { notes_list: [], recentlyDeleted: [] };
if (!db.notes_list) db.notes_list = [];
if (!db.recentlyDeleted) db.recentlyDeleted = [];

const daysShort = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function formatDateKey(date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function save() {
    localStorage.setItem('reson_db', JSON.stringify(db));
}

function commitNote() {
    const text = textarea.value.trim();
    if (!text) return;

    const dateKey = formatDateKey(selectedDate);
    // Fix: Default to 'general' instead of null/undefined
    const cat = currentCategory ? currentCategory.toLowerCase() : "general";
    
    // Categories that should merge into one card
    const groupable = ['todo', 'work', 'groceries', 'errands', 'dreams'];

    if (groupable.includes(cat)) {
        const existingNote = db.notes_list.find(n => n.date === dateKey && n.tags.includes(cat));
        if (existingNote) {
            existingNote.content += "\n" + text;
            save();
            textarea.value = '';
            renderDeck();
            uploadToCloud();
            return;
        }
    }

    const newNote = {
        id: Date.now(),
        date: dateKey,
        tags: [cat],
        content: text,
        checkedIndices: [] // Standardized name
    };

    db.notes_list.unshift(newNote);
    save();
    textarea.value = '';
    renderDeck();
    uploadToCloud();
}

function renderDeck() {
    const deck = document.getElementById('noteDeck');
    deck.innerHTML = '';
    const key = formatDateKey(selectedDate);
    
    const filtered = db.notes_list.filter(n => {
        const dateMatch = n.date === key;
        const catMatch = !currentCategory || n.tags.includes(currentCategory.toLowerCase());
        const isDeleted = db.recentlyDeleted.some(dn => dn.id === n.id);
        return dateMatch && catMatch && !isDeleted;
    });

    filtered.forEach(note => {
        const card = document.createElement('div');
        card.className = 'saved-note';
        
        const lines = note.content.split('\n').filter(l => l.trim() !== "");
        let checklistHTML = '<div class="card-checklist">';
        
        lines.forEach((lineText, index) => {
            // Fix: Standardized to use checkedIndices
            const isChecked = note.checkedIndices && note.checkedIndices.includes(index);
            checklistHTML += `
                <div class="checklist-item" onclick="event.stopPropagation(); toggleCheck(${note.id}, ${index})">
                    <input type="checkbox" ${isChecked ? 'checked' : ''}>
                    <div class="checklist-text ${isChecked ? 'done' : ''}">${lineText}</div>
                </div>
            `;
        });
        checklistHTML += '</div>';

        card.innerHTML = `
            <button class="note-menu-btn" onclick="event.stopPropagation(); openNoteMenu(event, ${note.id})">⋮</button>
            <span class="saved-note-title">${note.tags[0] || 'general'}</span>
            ${checklistHTML}
        `;
        
        card.onclick = () => openNoteViewer(note);
        deck.appendChild(card);
    });
}

function toggleCheck(noteId, lineIndex) {
    const note = db.notes_list.find(n => n.id === noteId);
    if (!note) return;

    // Fix: Use the same property name (checkedIndices) as the renderer
    if (!note.checkedIndices) note.checkedIndices = [];

    const foundIndex = note.checkedIndices.indexOf(lineIndex);
    if (foundIndex > -1) {
        note.checkedIndices.splice(foundIndex, 1);
    } else {
        note.checkedIndices.push(lineIndex);
    }

    save();
    renderDeck();
    uploadToCloud();
}

function switchCategory(cat, btn) {
    if (currentCategory === cat) {
        currentCategory = null;
        btn.classList.remove('active');
        btn.style.border = "none";
        document.getElementById('todoHeader').innerText = "Notes";
    } else {
        document.querySelectorAll('.bubble').forEach(b => {
            b.classList.remove('active');
            b.style.border = "none";
        });
        currentCategory = cat;
        btn.classList.add('active');
        btn.style.border = "2px solid var(--accent)";
        document.getElementById('todoHeader').innerText = btn.innerText + " List";
    }
    renderDeck();
}

function setupCalendar() {
    strip.innerHTML = '';
    const year = selectedDate.getFullYear();
    const month = selectedDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const todayKey = formatDateKey(new Date());
    const selectedKey = formatDateKey(selectedDate);

    document.getElementById('todayBtn').style.display = (selectedKey === todayKey) ? 'none' : 'block';
    document.getElementById('monthDisplay').innerText = selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    for (let i = 1; i <= daysInMonth; i++) {
        const date = new Date(year, month, i);
        const isSelected = formatDateKey(date) === selectedKey;
        const card = document.createElement('div');
        card.className = `day-card ${isSelected ? 'active' : ''}`;
        card.innerHTML = `<div style="font-size:0.7rem;">${daysShort[date.getDay()]}</div><div style="font-weight:800;font-size:1.2rem;">${i}</div>`;
        card.onclick = () => { selectedDate = date; setupCalendar(); renderDeck(); };
        strip.appendChild(card);
        if (isSelected) setTimeout(() => card.scrollIntoView({ behavior: 'smooth', inline: 'center' }), 0);
    }
}

function toggleModal() {
    const m = document.getElementById('calModal');
    const o = document.getElementById('overlay');
    const isOpen = m.style.display === 'block';
    if (!isOpen) renderHeatmap();
    m.style.display = isOpen ? 'none' : 'block';
    o.style.display = isOpen ? 'none' : 'block';
}

function renderHeatmap() {
    const grid = document.getElementById('fullGrid');
    grid.innerHTML = '';
    const year = selectedDate.getFullYear();
    const month = selectedDate.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const days = new Date(year, month + 1, 0).getDate();

    document.getElementById('modalMonthTitle').innerText = selectedDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();

    for (let p = 0; p < firstDay; p++) grid.appendChild(document.createElement('div'));
    for (let i = 1; i <= days; i++) {
        const d = new Date(year, month, i);
        const k = formatDateKey(d);
        const count = db.notes_list.filter(n => n.date === k).length;
        const el = document.createElement('div');
        el.className = `circle-day ${k === formatDateKey(selectedDate) ? 'selected' : ''}`;
        el.innerText = i;
        el.style.backgroundColor = count > 0 ? (count > 2 ? 'var(--heat-3)' : 'var(--heat-2)') : 'var(--heat-0)';
        el.onclick = () => { selectedDate = d; setupCalendar(); renderDeck(); toggleModal(); };
        grid.appendChild(el);
    }
}

// Fullscreen Viewer logic
let activeNote = null;
function openNoteViewer(note) {
    activeNote = note;
    const viewer = document.getElementById('noteViewer');
    const content = document.getElementById('noteViewerContent');
    content.value = note.content;
    viewer.style.display = 'block';
    setTimeout(() => viewer.classList.add('open'), 10);
}

function closeNoteViewer() {
    if (activeNote) {
        activeNote.content = document.getElementById('noteViewerContent').value;
        save();
        renderDeck();
    }
    const viewer = document.getElementById('noteViewer');
    viewer.classList.remove('open');
    setTimeout(() => { viewer.style.display = 'none'; activeNote = null; }, 350);
}

function saveViewerEdit() { closeNoteViewer(); uploadToCloud(); }

// Settings & Navigation
function showSettings() {
    document.querySelector('header').style.display = 'none';
    document.getElementById('strip').style.display = 'none';
    document.querySelector('.filter-container').style.display = 'none';
    document.querySelector('.note-container').style.display = 'none';
    document.getElementById('noteDeck').style.display = 'none';
    document.getElementById('settingsView').style.display = 'block';
    renderDeletedNotes();
}

function showMain() {
    document.querySelector('header').style.display = 'flex';
    document.getElementById('strip').style.display = 'flex';
    document.querySelector('.filter-container').style.display = 'flex';
    document.querySelector('.note-container').style.display = 'block';
    document.getElementById('noteDeck').style.display = 'grid';
    document.getElementById('settingsView').style.display = 'none';
    renderDeck();
}

function renderDeletedNotes() {
    const list = document.getElementById('deletedNotesList');
    list.innerHTML = '';
    db.recentlyDeleted.forEach(note => {
        const div = document.createElement('div');
        div.style = "background:#fff; border:1px solid #eee; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; color:black;";
        div.innerHTML = `<span style="font-size:0.8rem">${note.content.substring(0,25)}...</span>
                         <button onclick="restoreNote(${note.id})" style="background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:5px;">Restore</button>`;
        list.appendChild(div);
    });
}

function restoreNote(id) {
    const idx = db.recentlyDeleted.findIndex(n => n.id === id);
    const note = db.recentlyDeleted.splice(idx, 1)[0];
    db.notes_list.unshift(note);
    save();
    renderDeletedNotes();
}

function openNoteMenu(event, noteId) {
    const menu = document.getElementById('noteMenu');
    const rect = event.target.getBoundingClientRect();
    menu.style.display = 'block';
    menu.style.top = (rect.bottom + window.scrollY + 5) + 'px';
    menu.style.left = (rect.right - 150) + 'px';
    menu.innerHTML = `<button onclick="deleteNote(${noteId})" style="width:100%; text-align:left; background:none; border:none; color:red; padding:10px; cursor:pointer; font-weight:bold;">Delete Note</button>`;
}

function deleteNote(id) {
    const idx = db.notes_list.findIndex(n => n.id === id);
    const note = db.notes_list.splice(idx, 1)[0];
    db.recentlyDeleted.unshift(note);
    save();
    renderDeck();
    document.getElementById('noteMenu').style.display = 'none';
}

// Click away for menu
window.addEventListener('mousedown', (e) => {
    const menu = document.getElementById('noteMenu');
    if (menu.style.display === 'block' && !menu.contains(e.target) && !e.target.classList.contains('note-menu-btn')) {
        menu.style.display = 'none';
    }
});

const R2_URL = "https://pub-66479d392b224c95a6cb0e230ac238bb.r2.dev/notes_db.json";
async function uploadToCloud() {
    try {
        await fetch(R2_URL, {
            method: 'PUT',
            headers: { 'Authorization': 'Bearer cfut_HevbM2ak9IG7euRSqfJJvMtfl3rmGl0loh2gkwKA55fb0f6b', 'Content-Type': 'application/json' },
            body: JSON.stringify(db)
        });
    } catch (e) { console.error("Cloud failed"); }
}

async function syncWithCloud() {
    try {
        const res = await fetch(R2_URL, { cache: 'no-store' });
        const data = await res.json();
        if (data.notes_list) {
            db.notes_list = data.notes_list;
            save();
            renderDeck();
            alert("Synced!");
        }
    } catch (e) { alert("Sync failed"); }
}
