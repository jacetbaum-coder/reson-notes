<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reson Notes</title>

<style>

:root {
--bg:#77c98d;
--card:#ffffff;
--text:#000000;
--accent:#2d5a3a;
--muted:#666666;
--star-gold:#ffd700;
--heat-0:#f0fdf4;
--heat-1:#dcfce7;
--heat-2:#86efac;
--heat-3:#22c55e;
}

body{
margin:0;
font-family:-apple-system,system-ui,sans-serif;
background:var(--bg);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
min-height:100vh;
}

header{width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;position:relative;margin-bottom:10px;}
.month-label{font-size:1.2rem;font-weight:800;color:white;text-transform:uppercase;}

#todayBtn{
background:rgba(255,255,255,0.2);
border:1px solid white;
color:white;
padding:4px 12px;
border-radius:12px;
font-size:0.7rem;
font-weight:700;
cursor:pointer;
text-transform:uppercase;
margin-top:5px;
display:none;
}

.cal-icon-wrapper{position:absolute;right:0;top:0;}
.cal-icon{cursor:pointer;font-size:1.4rem;background:none;border:none;}

.calendar-strip{
display:flex;
overflow-x:auto;
gap:12px;
width:100%;
max-width:500px;
padding:15px 0;
scrollbar-width:none;
scroll-behavior:smooth;
}

.calendar-strip::-webkit-scrollbar{display:none;}

.calendar-strip::before,
.calendar-strip::after{content:'';min-width:calc(50% - 40px);}

.day-card{
min-width:65px;
background:var(--card);
border-radius:18px;
padding:12px 0;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
cursor:pointer;
transition:0.2s;
}

.day-card.active{
background:#000;
color:white;
transform:scale(1.05);
}

.todo-card{
width:100%;
max-width:500px;
background:#e8f5e9;
border-radius:25px;
padding:20px;
margin-bottom:15px;
display:none;
box-sizing:border-box;
}

.todo-header{font-weight:800;margin-bottom:15px;font-size:1.1rem;}

.todo-item{display:flex;align-items:center;gap:12px;margin-bottom:12px;}

.todo-item input[type="checkbox"]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;}

.todo-text.completed{text-decoration:line-through;color:var(--muted);opacity:0.7;}

.star-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:#ccc;filter:grayscale(1);}
.star-btn.starred{filter:grayscale(0);color:var(--star-gold);}

.filter-container{
display:flex;
gap:10px;
width:100%;
max-width:500px;
margin:15px 0;
flex-wrap:wrap;
}

.bubble{
padding:8px 20px;
background:var(--card);
border-radius:20px;
font-weight:600;
cursor:pointer;
border:none;
}

.bubble.active{
background:var(--accent);
color:white;
}

.note-container{
width:100%;
max-width:500px;
background:var(--card);
border-radius:30px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
box-sizing:border-box;
position:relative;
}

textarea{
width:100%;
height:35vh;
border:none;
outline:none;
resize:none;
font-size:1.1rem;
line-height:1.6;
}

/* PLUS BUTTON */

.add-note{
position:absolute;
bottom:-25px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
border:none;
background:black;
color:white;
font-size:28px;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

#overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:900;backdrop-filter:blur(4px);}

#calModal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:400px;
background:#111;
border-radius:30px;
padding:30px;
z-index:1000;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.modal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;text-align:center;}

.modal-day-label{font-size:0.6rem;color:#555;text-transform:uppercase;margin-bottom:5px;font-weight:800;}

.circle-day{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:0.9rem;
font-weight:700;
cursor:pointer;
transition:0.2s;
position:relative;
color:#333;
}

.circle-day.selected{outline:2px solid white;outline-offset:2px;}

.circle-day.holiday::after{
content:'';
position:absolute;
bottom:4px;
width:4px;
height:4px;
background:#ff4d4d;
border-radius:50%;
}

</style>
</head>

<body>

<header>
<div class="month-label" id="monthDisplay">March 2026</div>
<button id="todayBtn" onclick="jumpToToday()">Today</button>
<div class="cal-icon-wrapper">
<button class="cal-icon" onclick="toggleModal()">🗓️</button>
</div>
</header>

<div class="calendar-strip" id="strip"></div>

<div class="filter-container">
    <button class="bubble active" onclick="switchCategory('todo',this)">To-do</button>
    <button class="bubble" onclick="switchCategory('work',this)">Work</button>
    <button class="bubble" onclick="switchCategory('groceries',this)">Groceries</button>
    <button class="bubble" onclick="switchCategory('errands',this)">Errands</button> <button class="bubble" onclick="switchCategory('dreams',this)">Dreams</button>
</div>
    

<div class="todo-card" id="todoList" style="display:block;">
<div class="todo-header">To-do List</div>
<div id="todoItems"></div>
</div>

<div class="note-container">

<textarea id="noteContent" placeholder="Type your notes..."></textarea>

<button class="add-note" onclick="newNote()">+</button>

</div>

<div id="overlay" onclick="toggleModal()"></div>

<div id="calModal">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
<h2 id="modalMonthTitle" style="margin:0;letter-spacing:2px;">MARCH 2026</h2>
<button onclick="toggleModal()" style="background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;">×</button>
</div>

<div class="modal-grid">
<div class="modal-day-label">S</div>
<div class="modal-day-label">M</div>
<div class="modal-day-label">T</div>
<div class="modal-day-label">W</div>
<div class="modal-day-label">T</div>
<div class="modal-day-label">F</div>
<div class="modal-day-label">S</div>
</div>

<div class="modal-grid" id="fullGrid"></div>
</div>

<script>

const strip=document.getElementById('strip')
const fullGrid=document.getElementById('fullGrid')
const todoItemsContainer=document.getElementById('todoItems')
const textarea=document.getElementById('noteContent')
const todoList=document.getElementById('todoList')
const todayBtn=document.getElementById('todayBtn')

let selectedDate=new Date()
let currentCategory="todo"

let db=JSON.parse(localStorage.getItem('reson_db'))||{notes:{},todos:{}}
let starredIds=JSON.parse(localStorage.getItem('reson_starred_ids'))||[]

const daysShort=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']

const holidays={"2026-03-17":"St Patrick"}

function formatDateKey(date){
return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`
}

function save(){
localStorage.setItem('reson_db',JSON.stringify(db))
localStorage.setItem('reson_starred_ids',JSON.stringify(starredIds))
}

function noteKey(){
return formatDateKey(selectedDate)+"_"+currentCategory
}

function switchCategory(cat, btn) {
    document.querySelectorAll('.bubble').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Save current note before switching
    db.notes[noteKey()] = textarea.value;

    currentCategory = cat;

    // Update the header text
    document.querySelector('.todo-header').innerText = btn.innerText + " List";

    loadContent();
}

function newNote(){

db.notes[noteKey()]=textarea.value

textarea.value=""

save()

}

function setupCalendar(){

strip.innerHTML=''

const year=selectedDate.getFullYear()
const month=selectedDate.getMonth()
const daysInMonth=new Date(year,month+1,0).getDate()

const todayKey=formatDateKey(new Date())
const selectedKey=formatDateKey(selectedDate)

todayBtn.style.display=(selectedKey===todayKey)?'none':'block'

document.getElementById('monthDisplay').innerText=
selectedDate.toLocaleString('default',{month:'long',year:'numeric'})

for(let i=1;i<=daysInMonth;i++){

const date=new Date(year,month,i)
const isSelected=formatDateKey(date)===selectedKey

const card=document.createElement('div')
card.className=`day-card ${isSelected?'active':''}`

card.innerHTML=
`<div style="font-size:0.7rem;">${daysShort[date.getDay()]}</div>
<div style="font-weight:800;font-size:1.2rem;">${i}</div>`

card.onclick=()=>selectDay(date)

strip.appendChild(card)

if(isSelected)
setTimeout(()=>card.scrollIntoView({behavior:'smooth',inline:'center'}),50)

}

}

function jumpToToday(){
selectDay(new Date())
}

function selectDay(date){
selectedDate=date
setupCalendar()
loadContent()
}

function loadContent() {
    const noteText = db.notes[noteKey()] || "";
    textarea.value = noteText;

    const key = formatDateKey(selectedDate);
    const todos = db.todos[key] || [];

    // If there's text in the note OR existing todos, show the card
    if (noteText.trim() !== "" || todos.length > 0) {
        todoList.style.display = 'block';
        renderTodos(todos, noteText);
    } else {
        todoList.style.display = 'none';
    }
}

function renderTodos(list, noteText) {
    todoItemsContainer.innerHTML = '';

    // 1. Render existing "Official" Todos (from your DB)
    list.forEach(todo => {
        const isStarred = starredIds.includes(todo.id);
        const div = document.createElement('div');
        div.className = 'todo-item';
        div.innerHTML = `
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleCheck(${todo.id})">
            <span class="todo-text ${todo.completed ? 'completed' : ''}">${todo.text}</span>
            <button class="star-btn ${isStarred ? 'starred' : ''}" onclick="toggleStar(${todo.id})">★</button>
        `;
        todoItemsContainer.appendChild(div);
    });

    // 2. Turn "Notes" lines into Checkboxes (The "Buy Fish" Fix)
    if (noteText.trim() !== "") {
        const lines = noteText.split('\n').filter(line => line.trim() !== "");
        lines.forEach((line, index) => {
            const div = document.createElement('div');
            div.className = 'todo-item';
            // We give these a temporary look since they are "Note-based" items
            div.innerHTML = `
                <input type="checkbox">
                <span class="todo-text">${line}</span>
                <button class="star-btn">★</button>
            `;
            todoItemsContainer.appendChild(div);
        });
    }
}
    
function toggleCheck(id){

const key=formatDateKey(selectedDate)

const item=db.todos[key].find(t=>t.id===id)

if(item){
item.completed=!item.completed
save()
loadContent()
}

}

function toggleStar(id){

const idx=starredIds.indexOf(id)

idx>-1?starredIds.splice(idx,1):starredIds.push(id)

save()
loadContent()

}

function toggleModal(){

const m=document.getElementById('calModal')
const o=document.getElementById('overlay')

const isOpen=m.style.display==='block'

if(!isOpen)renderHeatmap()

m.style.display=isOpen?'none':'block'
o.style.display=isOpen?'none':'block'

}

function renderHeatmap(){

fullGrid.innerHTML=''

const year=selectedDate.getFullYear()
const month=selectedDate.getMonth()

const firstDay=new Date(year,month,1).getDay()
const daysInMonth=new Date(year,month+1,0).getDate()

for(let p=0;p<firstDay;p++)
fullGrid.appendChild(document.createElement('div'))

for(let i=1;i<=daysInMonth;i++){

const date=new Date(year,month,i)
const key=formatDateKey(date)
const taskCount=(db.todos[key]||[]).length

const dayEl=document.createElement('div')

dayEl.className=`circle-day ${key===formatDateKey(selectedDate)?'selected':''} ${holidays[key]?'holiday':''}`

dayEl.innerText=i

if(taskCount===0)dayEl.style.backgroundColor='var(--heat-0)'
else if(taskCount<=2)dayEl.style.backgroundColor='var(--heat-1)'
else if(taskCount<=4)dayEl.style.backgroundColor='var(--heat-2)'
else dayEl.style.backgroundColor='var(--heat-3)'

dayEl.onclick=()=>{selectDay(date);toggleModal()}

fullGrid.appendChild(dayEl)

}

}

textarea.oninput = () => {
    const text = textarea.value.toLowerCase();
    
    // Auto-sorting Logic
    if (text.includes("buy") || text.includes("food") || text.includes("milk")) {
        autoSwitch('groceries');
    } 
    else if (text.includes("bank") || text.includes("petco") || text.includes("post office")) {
        autoSwitch('errands');
    }

    // Save the note to whatever the current category is
    db.notes[noteKey()] = textarea.value;
    save();
};

// Helper function to simulate a bubble click
function autoSwitch(categoryName) {
    if (currentCategory === categoryName) return; // Already there

    const buttons = document.querySelectorAll('.bubble');
    buttons.forEach(btn => {
        if (btn.innerText.toLowerCase() === categoryName) {
            switchCategory(categoryName, btn);
        }
    });
}
window.onload=()=>{
setupCalendar()
loadContent()
}

</script>

</body>
</html>
