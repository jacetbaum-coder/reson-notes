<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reson Notes</title>
    <style>
        :root {
            --bg: #77c98d; 
            --card: #ffffff;
            --text: #000000;
            --accent: #2d5a3a; 
            --muted: #666666;
            --todo-bg: #e8f5e9;
        }

        body { 
            margin: 0; font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); display: flex; flex-direction: column;
            align-items: center; padding: 20px; min-height: 100vh;
        }

        header { width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .month-label { font-size: 1.2rem; font-weight: 800; color: white; text-transform: uppercase; margin-bottom: 10px; }
        .cal-icon-wrapper { position: absolute; right: 0; top: 0; }
        .cal-icon { cursor: pointer; font-size: 1.4rem; background: none; border: none; }

        /* Integrated Calendar & Tag Row */
        .calendar-row {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 500px;
            gap: 10px;
            margin-bottom: 15px;
        }

        .calendar-strip {
            display: flex; overflow-x: auto; gap: 12px; flex-grow: 1;
            padding: 10px 5px; scrollbar-width: none;
        }
        .calendar-strip::-webkit-scrollbar { display: none; }

        .day-card {
            min-width: 65px; background: var(--card); border-radius: 18px;
            padding: 12px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer;
        }
        .day-card.active-view { border: 3px solid #000; }
        .day-card.is-today { background: #000; color: white; }

        /* Integrated Categories Button */
        .dropdown { position: relative; }
        .dropbtn {
            background: var(--card); border: none; height: 65px; padding: 0 15px;
            border-radius: 18px; cursor: pointer; font-weight: 800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); white-space: nowrap;
        }
        .dropdown-content {
            display: none; position: absolute; background-color: var(--card);
            min-width: 160px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 10px; border-radius: 15px; z-index: 100; right: 0; top: 75px;
        }
        .dropdown.open .dropdown-content { display: block; }
        .dropdown-content label { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; font-weight: 600; }

        /* Modern Checkbox */
        input[type="checkbox"] {
            appearance: none; width: 18px; height: 18px; border: 2px solid #ddd;
            border-radius: 5px; cursor: pointer; position: relative;
        }
        input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
        input[type="checkbox"]:checked::after { content: '✓'; color: white; position: absolute; font-size: 12px; left: 3px; top: -1px; }

        /* To-Do List Card */
        .todo-card {
            width: 100%; max-width: 500px; background: var(--todo-bg);
            border-radius: 25px; padding: 20px; margin-bottom: 15px; display: none;
        }
        .todo-header { font-weight: 800; margin-bottom: 15px; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center; }
        .todo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: white; padding: 8px 12px; border-radius: 15px; }
        .todo-item.checked span { text-decoration: line-through; opacity: 0.5; }
        
        .star { cursor: pointer; color: #ccc; font-size: 1.2rem; transition: 0.2s; }
        .star.starred { color: #f1c40f; }

        /* Note Area */
        .note-container {
            width: 100%; max-width: 500px; background: var(--card);
            border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%; height: 40vh; border: none; outline: none; resize: none;
            font-size: 1.1rem; line-height: 1.6; background: transparent;
        }

        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); z-index: 900; }
        #calModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 380px; background: white; border-radius: 25px; padding: 25px; z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <div class="month-label">March 2026</div>
        <div class="cal-icon-wrapper"><button class="cal-icon" onclick="toggleModal()">🗓️</button></div>
    </header>

    <div class="calendar-row">
        <div class="calendar-strip" id="strip"></div>
        
        <div class="dropdown" id="catDropdown">
            <button class="dropbtn" onclick="toggleDropdown()">Tags ▼</button>
            <div class="dropdown-content" id="categoryOptions">
                <label><input type="checkbox" value="todo" onchange="updateTagFilter(this)"> To-do</label>
                <label><input type="checkbox" value="work" onchange="updateTagFilter(this)"> Work</label>
                <label><input type="checkbox" value="groceries" onchange="updateTagFilter(this)"> Groceries</label>
                <label><input type="checkbox" value="roommates" onchange="updateTagFilter(this)"> Roommates</label>
            </div>
        </div>
    </div>

    <div class="todo-card" id="todoList">
        <div class="todo-header">
            <span>To-do List</span>
            <button onclick="addNewTask()" style="border:none; background:black; color:white; border-radius:50%; width:24px; height:24px; cursor:pointer;">+</button>
        </div>
        <div id="todoItems"></div>
    </div>

    <div class="note-container">
        <textarea id="noteContent" placeholder="Type your main notes here..."></textarea>
    </div>

    <div id="overlay" onclick="toggleModal()"></div>
    <div id="calModal">
        <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; font-size:1.1rem;">MARCH 2026</h2>
            <button onclick="toggleModal()" style="border:none; background:#eee; border-radius:50%; width:30px; height:30px; cursor:pointer;">×</button>
        </div>
        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center;" id="fullGrid"></div>
    </div>

    <script>
        let selectedDate = new Date(); 
        let tasks = JSON.parse(localStorage.getItem('reson_tasks')) || [];
        let notes = JSON.parse(localStorage.getItem('reson_notes')) || {};
        let activeTags = new Set();
        
        const strip = document.getElementById('strip');
        const textarea = document.getElementById('noteContent');
        const todoContainer = document.getElementById('todoItems');
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

        function init() {
            renderStrip();
            renderTasks();
            loadNote();
        }

        function toggleDropdown() {
            document.getElementById('catDropdown').classList.toggle('open');
        }

        function updateTagFilter(cb) {
            if (cb.checked) {
                activeTags.add(cb.value);
                if (cb.value === 'todo') {
                    document.getElementById('todoList').style.display = 'block';
                }
            } else {
                activeTags.delete(cb.value);
                if (cb.value === 'todo') {
                    document.getElementById('todoList').style.display = 'none';
                }
            }
            renderTasks();
        }

        function renderStrip() {
            strip.innerHTML = '';
            const today = new Date();
            for (let i = 1; i <= 31; i++) {
                const date = new Date(2026, 2, i);
                const card = document.createElement('div');
                card.className = `day-card ${i === selectedDate.getDate() ? 'active-view' : ''} ${i === today.getDate() && today.getMonth() === 2 ? 'is-today' : ''}`;
                card.innerHTML = `<div style="font-size:0.7rem; font-weight:600;">${days[date.getDay()]}</div><div style="font-weight:800; font-size:1.2rem;">${i}</div>`;
                card.onclick = () => {
                    selectedDate = new Date(2026, 2, i);
                    init();
                };
                strip.appendChild(card);
                if(i === selectedDate.getDate()) card.scrollIntoView({inline: "center", behavior: "smooth"});
            }
        }

        function renderTasks() {
            todoContainer.innerHTML = '';
            const dateKey = selectedDate.toISOString().split('T')[0];
            const today = new Date();

            const visibleTasks = tasks.filter(t => {
                if (t.starred) return true; 
                if (t.date === dateKey) return true; 
                const taskDate = new Date(t.date);
                const diffDays = Math.floor((today - taskDate) / (1000 * 60 * 60 * 24));
                return diffDays < 7; 
            });

            visibleTasks.forEach(task => {
                const item = document.createElement('div');
                item.className = `todo-item ${task.checked ? 'checked' : ''}`;
                item.innerHTML = `
                    <input type="checkbox" ${task.checked ? 'checked' : ''} onchange="toggleCheck(${task.id})">
                    <span style="flex-grow:1">${task.text}</span>
                    <span class="star ${task.starred ? 'starred' : ''}" onclick="toggleStar(${task.id})">★</span>
                `;
                todoContainer.appendChild(item);
            });
        }

        function toggleCheck(id) {
            const task = tasks.find(t => t.id === id);
            task.checked = !task.checked;
            save();
            renderTasks();
        }

        function toggleStar(id) {
            const task = tasks.find(t => t.id === id);
            task.starred = !task.starred;
            save();
            renderTasks();
        }

        function addNewTask() {
            const text = prompt("New Task:");
            if (text) {
                tasks.push({
                    id: Date.now(),
                    text: text,
                    checked: false,
                    starred: false,
                    date: selectedDate.toISOString().split('T')[0]
                });
                save();
                renderTasks();
            }
        }

        function loadNote() {
            const dateKey = selectedDate.toISOString().split('T')[0];
            textarea.value = notes[dateKey] || "";
        }

        textarea.oninput = () => {
            const dateKey = selectedDate.toISOString().split('T')[0];
            notes[dateKey] = textarea.value;
            localStorage.setItem('reson_notes', JSON.stringify(notes));
        };

        function toggleModal() {
            const m = document.getElementById('calModal');
            const o = document.getElementById('overlay');
            const isOpen = m.style.display === 'block';
            m.style.display = isOpen ? 'none' : 'block';
            o.style.display = isOpen ? 'none' : 'block';
        }

        function save() { 
            localStorage.setItem('reson_tasks', JSON.stringify(tasks)); 
        }

        window.onclick = (e) => {
            if (!e.target.closest('.dropdown')) {
                document.getElementById('catDropdown').classList.remove('open');
            }
        };

        window.onload = init;
    </script>
</body>
</html>
