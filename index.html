<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reson Notes</title>

<style>

:root{
--bg:#77c98d;
--card:#ffffff;
--accent:#2d5a3a;
--muted:#666;
--star:#ffd700;
}

body{
margin:0;
font-family:-apple-system,system-ui,sans-serif;
background:var(--bg);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

header{
width:100%;
max-width:500px;
text-align:center;
color:white;
font-weight:800;
margin-bottom:10px;
}

.calendar-strip{
display:flex;
gap:10px;
overflow-x:auto;
width:100%;
max-width:500px;
margin-bottom:10px;
}

.day-card{
min-width:60px;
background:white;
border-radius:16px;
padding:10px;
text-align:center;
cursor:pointer;
}

.day-card.active{
background:black;
color:white;
}

.filter-container{
display:flex;
gap:8px;
width:100%;
max-width:500px;
margin:10px 0;
flex-wrap:wrap;
}

.bubble{
padding:8px 16px;
border-radius:20px;
border:none;
background:white;
font-weight:600;
cursor:pointer;
}

.bubble.active{
background:var(--accent);
color:white;
}

.note-container{
width:100%;
max-width:500px;
background:white;
border-radius:30px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:30vh;
border:none;
outline:none;
resize:none;
font-size:1.1rem;
}

.todo-card{
width:100%;
max-width:500px;
background:#e8f5e9;
border-radius:25px;
padding:20px;
margin-bottom:10px;
}

.todo-item{
display:flex;
gap:10px;
margin-bottom:8px;
}

.plus-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:black;
color:white;
font-size:30px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.note-list{
width:100%;
max-width:500px;
margin-top:10px;
}

.note-preview{
background:white;
padding:10px;
border-radius:12px;
margin-bottom:6px;
cursor:pointer;
font-size:.9rem;
}

</style>
</head>

<body>

<header>
<div id="monthDisplay"></div>
</header>

<div class="calendar-strip" id="strip"></div>

<div class="filter-container">

<button class="bubble active" onclick="setFilter('all')">All</button>
<button class="bubble" onclick="setFilter('todo')">To-Do</button>
<button class="bubble" onclick="setFilter('work')">Work</button>
<button class="bubble" onclick="setFilter('groceries')">Groceries</button>
<button class="bubble" onclick="setFilter('dreams')">Dreams</button>
<button class="bubble" onclick="setFilter('notes')">Notes</button>

</div>

<div class="todo-card">
<div style="font-weight:800;margin-bottom:10px;">To-Do</div>
<div id="todoItems"></div>
</div>

<div class="note-container">
<textarea id="noteInput" placeholder="Type anything..."></textarea>
</div>

<div class="note-list" id="noteList"></div>

<button class="plus-btn" onclick="newNote()">+</button>

<script>

let db=JSON.parse(localStorage.getItem("reson_v2"))||{
notes:[],
todos:[]
}

let filter="all"

const textarea=document.getElementById("noteInput")

function save(){
localStorage.setItem("reson_v2",JSON.stringify(db))
}

function renderTodos(){

const container=document.getElementById("todoItems")
container.innerHTML=""

db.todos.forEach(t=>{

if(filter!=="all" && filter!=="todo") return

const div=document.createElement("div")
div.className="todo-item"

div.innerHTML=`
<input type="checkbox" ${t.done?"checked":""} onclick="toggleTodo(${t.id})">
<span>${t.text}</span>
`

container.appendChild(div)

})

}

function toggleTodo(id){

const t=db.todos.find(x=>x.id===id)
t.done=!t.done
save()
renderTodos()

}

function setFilter(f){

filter=f

document.querySelectorAll(".bubble").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")

renderNotes()
renderTodos()

}

function renderNotes(){

const list=document.getElementById("noteList")
list.innerHTML=""

db.notes
.filter(n=>filter==="all"||n.tag===filter)
.reverse()
.forEach(n=>{

const div=document.createElement("div")
div.className="note-preview"
div.innerText=n.text.slice(0,120)

div.onclick=()=>{
textarea.value=n.text
}

list.appendChild(div)

})

}

function detectTag(text){

text=text.toLowerCase()

if(text.startsWith("dream:")) return "dreams"

if(text.includes("buy")||text.includes("milk")||text.includes("groceries"))
return "groceries"

if(text.includes("grade")||text.includes("lesson")||text.includes("school"))
return "work"

return "notes"

}

function detectTodo(text){

const actions=["buy","call","email","finish","grade","send","schedule"]

return actions.some(a=>text.toLowerCase().startsWith(a))

}

textarea.oninput=()=>{

const lines=textarea.value.split("\n")

lines.forEach(line=>{

if(detectTodo(line)){

db.todos.push({
id:Date.now()+Math.random(),
text:line,
done:false
})

textarea.value=""

}

})

renderTodos()
save()

}

function newNote(){

const text=textarea.value.trim()

if(!text) return

const tag=detectTag(text)

db.notes.push({
id:Date.now(),
text,
tag
})

textarea.value=""

save()
renderNotes()

}

renderNotes()
renderTodos()

</script>

</body>
</html>
